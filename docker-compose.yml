services:
  scanner:
    build:
      context: .
      dockerfile: docker/scanner.Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
      - /dev/bus/usb:/dev/bus/usb
    privileged: true

  heatmap:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["python", "-u", "/app/heatmap_worker.py"]
    volumes:
      - ./data:/data

  web:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["python", "-u", "/app/gallery.py"]
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/data:ro

  spyserver:
    build:
      context: .
      dockerfile: docker/spyserver.Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - scanner
    ports:
      - "${SPYSERVER_PORT:-5555}:${SPYSERVER_PORT:-5555}/tcp"
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true
